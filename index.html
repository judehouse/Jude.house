<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Jude House | Cinematic Portfolio</title>
    <meta
      name="description"
      content="A dark, cinematic portfolio for Jude House with stacked full-width stills and a direct contact path."
    />
    <meta name="theme-color" content="#050505" />
    <meta property="og:title" content="Jude House | Cinematic Portfolio" />
    <meta
      property="og:description"
      content="Stacked stills, cinematic motion, and a minimal contact-first layout for Jude House."
    />
    <meta property="og:type" content="website" />
    <link rel="icon" href="img/black-block.svg" type="image/svg+xml" sizes="any" />
    <link rel="stylesheet" href="styles.css" />
    <script defer src="main.js"></script>
  </head>
  <body>
    <a class="skip-link" href="#content">Skip to content</a>

    <header class="masthead" aria-label="Primary">
      <a class="masthead__brand" href="#work">Jude House ©</a>
      <a class="masthead__hire" href="#contact">Hire</a>
    </header>

    <main id="content" class="showcase">
      <div class="showcase__bands" id="showcase-bands"></div>
    </main>

    <footer class="footer" aria-label="Footer">
      <div class="footer__left">jude.house</div>
      <nav class="footer__nav" aria-label="Footer navigation">
        <button type="button">video</button>
        <button type="button">photo</button>
        <button type="button">design</button>
      </nav>
      <a class="footer__right" href="mailto:info@jude.house?subject=Project%20Inquiry">contact</a>
    </footer>

    <div class="video-modal" id="video-modal" aria-hidden="true">
      <button class="video-modal__backdrop" type="button" data-close aria-label="Close video"></button>
      <div class="video-modal__shell" role="dialog" aria-modal="true" aria-label="Video player">
        <button class="video-modal__close" type="button" data-close aria-label="Close video">×</button>
        <div class="video-modal__stage" id="video-modal-stage"></div>
      </div>
    </div>
  </body>
</html>
